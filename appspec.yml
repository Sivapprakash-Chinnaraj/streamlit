version: 0.0
os: linux

# Add this files section so CodeDeploy extracts your scripts/ directory onto the host
files:
  - source: /
    destination: /home/ubuntu/streamlit_app

hooks:
  ApplicationStop:
    - location: scripts/stop_container.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/start_container.sh
      timeout: 300
      runas: root
